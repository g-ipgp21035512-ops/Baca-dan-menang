<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Permainan Baca & Menang</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .kotak { background: white; border: 2px solid #333; padding: 20px; border-radius: 10px; display: inline-block; }
        #ayat { font-size: 24px; color: blue; font-weight: bold; margin: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Baca dan Menang!</h1>
    
    <div class="kotak">
        <p>Sila sebut ayat ini:</p>
        <div id="ayat">Nyonya itu sedang menyanyi</div>
        <button onclick="mulaSebut()">🎤 TEKAN & SEBUT</button>
        <div id="status">Sedia...</div>
        <p id="apaDengar" style="color: gray;"></p>
    </div>

    <script>
        const senarai = [
            "Nyonya itu sedang menyanyi", "Jangan pegang pisau itu", "Menyahut", 
            "Masukkan tauge itu ke dalam kuali", "Ali sedang mengayuh basikal sambil menghafal sifir",
            "Imbau kenangan", "Kalau sudah makan sila simpan bekas anda", 
            "Amboi rajinnya kamu", "Mengaum", "Syiling", "Aurum", "Jangan berlengah", 
            "Ungu", "Dunia khayalan", "Syarat", "Menyusur", "di tengah", "Apa khabar kamu"
        ];

        let nombor = 0;
        const ayatDiv = document.getElementById('ayat');
        const statusDiv = document.getElementById('status');
        const apaDengar = document.getElementById('apaDengar');

        const Pengecam = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!Pengecam) {
            alert("Browser anda tak sokong suara. Sila guna Google Chrome!");
        } else {
            const recognition = new Pengecam();
            recognition.lang = 'ms-MY';

            function mulaSebut() {
                recognition.start();
                statusDiv.innerText = "Mendengar... Sebut sekarang!";
                statusDiv.style.color = "orange";
            }

            recognition.onresult = (event) => {
                const hasil = event.results[0][0].transcript.toLowerCase().replace(/[^\w\s]/g, "");
                const target = senarai[nombor].toLowerCase().replace(/[^\w\s]/g, "");
                
                apaDengar.innerText = "Sistem dengar: " + hasil;

                if (hasil.includes(target) || target.includes(hasil)) {
                    statusDiv.innerText = "✅ BETUL!";
                    statusDiv.style.color = "green";
                    nombor++;
                    if (nombor < senarai.length) {
                        setTimeout(() => {
                            ayatDiv.innerText = senarai[nombor];
                            statusDiv.innerText = "Sedia untuk ayat seterusnya...";
                            apaDengar.innerText = "";
                        }, 2000);
                    } else {
                        ayatDiv.innerText = "TAMAT! Anda menang!";
                    }
                } else {
                    statusDiv.innerText = "❌ SALAH. Cuba lagi!";
                    statusDiv.style.color = "red";
                }
            };
        }
    </script>
</body>
</html>
